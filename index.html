<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Neural Hand Interface // v17.0</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at top, #12142a 0%, #05060c 55%, #000 100%);
      min-height: 100vh;
      overflow: hidden;
      color: #fff;
    }
    .container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
    #video-container { position: relative; width: 100%; height: 100%; background: #000; }
    #input_video, #output_canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1);
    }
    #output_canvas { pointer-events: none; }
    .ui-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 10; }

    .header {
      position: absolute; top: 18px; left: 18px; right: 18px;
      display: flex; justify-content: space-between; align-items: center; gap: 14px;
      flex-wrap: wrap; pointer-events: auto; z-index: 20;
    }
    .title-section h1 {
      font-size: 1.55rem;
      background: linear-gradient(135deg, #8b5cf6, #22d3ee, #34d399);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      letter-spacing: -0.5px;
    }
    .title-section p { color: #9ca3af; font-size: 0.82rem; margin-top: 4px; }

    .stats-panel, .control-panel, .hand-info, .gesture-history {
      background: rgba(10, 12, 20, 0.62);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    }

    .stats-panel {
      border-radius: 18px; padding: 10px 16px; display: flex; gap: 18px;
    }
    .stat { text-align: center; min-width: 54px; }
    .stat-value { font-size: 1.3rem; font-weight: 700; color: #22d3ee; }
    .stat-label { font-size: 0.68rem; color: #94a3b8; }

    .hand-info {
      position: absolute; top: 50%; right: 18px; transform: translateY(-50%);
      border-radius: 16px; padding: 14px; min-width: 190px; pointer-events: auto; z-index: 20;
    }
    .hand-info h4 { font-size: 0.9rem; color: #22d3ee; margin-bottom: 10px; }
    .finger-status { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .finger {
      text-align: center; padding: 7px 4px; border-radius: 10px;
      background: rgba(255,255,255,0.05); font-size: 0.72rem;
      transition: all 0.18s ease;
    }
    .finger.up { background: rgba(34, 211, 238, 0.22); border: 1px solid rgba(34, 211, 238, 0.8); transform: translateY(-1px); }

    .gesture-history {
      position: absolute; right: 18px; bottom: 104px; border-radius: 14px; padding: 10px;
      min-width: 180px; z-index: 20;
    }
    .gesture-history h4 { font-size: 0.72rem; color: #9ca3af; margin-bottom: 6px; }
    .history-item { padding: 2px 0; font-family: ui-monospace, SFMono-Regular, monospace; font-size: 0.78rem; color: #e5e7eb; }

    .control-panel {
      position: absolute; left: 18px; right: 18px; bottom: 18px;
      border-radius: 20px; padding: 14px 16px;
      display: flex; justify-content: space-between; align-items: center; gap: 14px;
      pointer-events: auto; z-index: 20; flex-wrap: wrap;
    }
    .gesture-info { display: flex; align-items: center; gap: 12px; }
    .gesture-badge {
      background: linear-gradient(135deg, #0f172a, #312e81);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 9px 14px; border-radius: 999px; font-weight: 700; letter-spacing: 0.3px;
    }
    .confidence-bar {
      width: 180px; height: 8px; border-radius: 999px; overflow: hidden;
      background: rgba(255,255,255,0.14);
    }
    .confidence-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #22d3ee, #8b5cf6, #34d399);
      transition: width 0.12s linear;
    }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: white; padding: 9px 14px; border-radius: 12px;
      cursor: pointer; transition: transform 0.18s ease, background 0.18s ease;
      font-size: 0.85rem; pointer-events: auto;
    }
    button:hover { transform: translateY(-1px); background: rgba(255,255,255,0.14); }
    button.active { background: linear-gradient(135deg, #2563eb, #7c3aed); border-color: transparent; }

    .instructions {
      position: absolute; left: 50%; bottom: 96px; transform: translateX(-50%);
      background: rgba(0,0,0,0.45); backdrop-filter: blur(10px);
      border-radius: 999px; padding: 8px 14px; font-size: 0.72rem; color: #cbd5e1;
      white-space: nowrap; z-index: 20;
    }
    .crosshair {
      position: absolute; width: 20px; height: 20px; border: 2px solid rgba(34,211,238,0.9);
      border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none;
      box-shadow: 0 0 18px rgba(34,211,238,0.55);
      opacity: 0; z-index: 25;
    }

    @media (max-width: 768px) {
      .hand-info, .gesture-history { display: none; }
      .stats-panel { padding: 8px 12px; gap: 12px; }
      .title-section h1 { font-size: 1.15rem; }
      .instructions { white-space: normal; text-align: center; width: 92%; }
      .control-panel { flex-direction: column; align-items: stretch; }
      .confidence-bar { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="video-container">
      <video id="input_video" autoplay playsinline></video>
      <canvas id="output_canvas" width="1280" height="720"></canvas>
      <div class="crosshair" id="crosshair"></div>
    </div>

    <div class="ui-overlay">
      <div class="header">
        <div class="title-section">
          <h1>🧠 Neural Hand Interface // v17.0</h1>
          <p>AI Hand Tracking • Gesture Fusion • Depth-Aware UI</p>
        </div>
        <div class="stats-panel">
          <div class="stat"><div class="stat-value" id="fps">0</div><div class="stat-label">FPS</div></div>
          <div class="stat"><div class="stat-value" id="handCount">0</div><div class="stat-label">Hands</div></div>
          <div class="stat"><div class="stat-value" id="landmarkCount">0</div><div class="stat-label">Points</div></div>
        </div>
      </div>

      <div class="hand-info">
        <h4>✋ Finger Status</h4>
        <div class="finger-status">
          <div class="finger" id="thumb">👍</div>
          <div class="finger" id="index">☝️</div>
          <div class="finger" id="middle">✌️</div>
          <div class="finger" id="ring">🤘</div>
          <div class="finger" id="pinky">🤙</div>
        </div>
      </div>

      <div class="gesture-history">
        <h4>📜 Gesture History</h4>
        <div id="historyList"><div class="history-item">--</div></div>
      </div>

      <div class="control-panel">
        <div class="gesture-info">
          <span class="gesture-badge" id="gestureName">🤚 Detecting...</span>
          <div class="confidence-bar"><div class="confidence-fill" id="confidenceFill"></div></div>
        </div>
        <div class="controls">
          <button id="toggleLandmarksBtn" class="active">🎯 Landmarks</button>
          <button id="toggleSkeletonBtn" class="active">🦴 Skeleton</button>
          <button id="toggleTrailsBtn" class="active">✨ Trails</button>
          <button id="clearHistoryBtn">🗑️ Clear</button>
        </div>
      </div>

      <div class="instructions">
        Show your hand: ✌️ Peace = Click • 🖐️ Open Palm = Select • 👊 Fist = Stop • 👌 OK = Confirm
      </div>
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const crosshair = document.getElementById('crosshair');

    const fpsElement = document.getElementById('fps');
    const handCountElement = document.getElementById('handCount');
    const landmarkCountElement = document.getElementById('landmarkCount');
    const gestureNameElement = document.getElementById('gestureName');
    const confidenceFill = document.getElementById('confidenceFill');
    const historyList = document.getElementById('historyList');

    const fingerElements = {
      thumb: document.getElementById('thumb'),
      index: document.getElementById('index'),
      middle: document.getElementById('middle'),
      ring: document.getElementById('ring'),
      pinky: document.getElementById('pinky')
    };

    let showLandmarks = true;
    let showSkeleton = true;
    let showTrails = true;
    let gestureHistory = [];
    let lastGesture = '';
    let frameCount = 0;
    let lastTime = performance.now();
    let trails = [];

    const gestures = {
      peace: { name: '✌️ PEACE', action: 'Click' },
      open_palm: { name: '🖐️ OPEN PALM', action: 'Select' },
      fist: { name: '👊 FIST', action: 'Stop' },
      thumbs_up: { name: '👍 THUMBS UP', action: 'Confirm' },
      point: { name: '☝️ POINT', action: 'Navigate' },
      three: { name: '🤟 THREE', action: 'Special' },
      ok: { name: '👌 OK', action: 'Confirm' },
      none: { name: '🤚 NO GESTURE', action: 'Waiting' }
    };

    const handsModule = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    handsModule.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.65,
      minTrackingConfidence: 0.65
    });

    handsModule.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => { await handsModule.send({ image: videoElement }); },
      width: 1280,
      height: 720
    });

    camera.start();

    function onResults(results) {
      canvasElement.width = results.image.width;
      canvasElement.height = results.image.height;

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      const hands = results.multiHandLandmarks || [];
      const handedness = results.multiHandedness || [];
      handCountElement.textContent = hands.length;

      let totalLandmarks = 0;

      if (hands.length) {
        hands.forEach((landmarks, i) => {
          totalLandmarks += landmarks.length;
          const handLabel = handedness[i]?.label || 'Unknown';
          const gesture = detectGesture(landmarks, handLabel);

          if (showSkeleton) drawConnections(landmarks);
          if (showLandmarks) drawLandmarks(landmarks, i);
          if (showTrails) pushTrail(landmarks);

          updateGestureDisplay(gesture);
          updateFingerStatus(landmarks);
          updatePointer(landmarks);
        });
      } else {
        gestureNameElement.textContent = '🤚 NO HAND DETECTED';
        confidenceFill.style.width = '0%';
        crosshair.style.opacity = 0;
      }

      if (showTrails) drawTrails();
      landmarkCountElement.textContent = totalLandmarks;

      frameCount++;
      const now = performance.now();
      if (now - lastTime >= 1000) {
        fpsElement.textContent = frameCount;
        frameCount = 0;
        lastTime = now;
      }

      canvasCtx.restore();
    }

    function drawLandmarks(landmarks, handIndex) {
      const colors = ['#22d3ee', '#34d399'];
      const c = colors[handIndex % colors.length];
      for (let i = 0; i < landmarks.length; i++) {
        const x = landmarks[i].x * canvasElement.width;
        const y = landmarks[i].y * canvasElement.height;
        const z = landmarks[i].z || 0;
        const r = Math.max(2, 6 - Math.abs(z) * 12);

        canvasCtx.beginPath();
        canvasCtx.arc(x, y, r, 0, Math.PI * 2);
        canvasCtx.fillStyle = c;
        canvasCtx.shadowBlur = 12;
        canvasCtx.shadowColor = c;
        canvasCtx.fill();
        canvasCtx.shadowBlur = 0;
      }
    }

    function drawConnections(landmarks) {
      const connections = [
        [0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
        [0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],
        [0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]
      ];
      canvasCtx.strokeStyle = 'rgba(255,255,255,0.55)';
      canvasCtx.lineWidth = 2;
      connections.forEach(([a, b]) => {
        const p1 = landmarks[a], p2 = landmarks[b];
        if (!p1 || !p2) return;
        canvasCtx.beginPath();
        canvasCtx.moveTo(p1.x * canvasElement.width, p1.y * canvasElement.height);
        canvasCtx.lineTo(p2.x * canvasElement.width, p2.y * canvasElement.height);
        canvasCtx.stroke();
      });
    }

    function isFingerExtended(landmarks, finger) {
      const tips = { thumb: 4, index: 8, middle: 12, ring: 16, pinky: 20 };
      const bases = { thumb: 2, index: 6, middle: 10, ring: 14, pinky: 18 };
      const tip = landmarks[tips[finger]], base = landmarks[bases[finger]];
      if (!tip || !base) return false;
      if (finger === 'thumb') return tip.x < base.x;
      return tip.y < base.y;
    }

    function detectGesture(landmarks, handedness) {
      const f = {
        thumb: isFingerExtended(landmarks, 'thumb'),
        index: isFingerExtended(landmarks, 'index'),
        middle: isFingerExtended(landmarks, 'middle'),
        ring: isFingerExtended(landmarks, 'ring'),
        pinky: isFingerExtended(landmarks, 'pinky')
      };

      const tipIndex = landmarks[8], tipThumb = landmarks[4];
      const pinch = tipIndex && tipThumb ? Math.hypot(tipIndex.x - tipThumb.x, tipIndex.y - tipThumb.y) < 0.05 : false;

      if (f.index && f.middle && !f.ring && !f.pinky && !f.thumb) return 'peace';
      if (f.index && !f.middle && !f.ring && !f.pinky && !f.thumb) return 'point';
      if (f.thumb && !f.index && !f.middle && !f.ring && !f.pinky) return 'thumbs_up';
      if (!f.thumb && !f.index && !f.middle && !f.ring && !f.pinky) return 'fist';
      if (f.thumb && f.index && f.middle && f.ring && f.pinky) return 'open_palm';
      if (f.index && f.middle && f.thumb && !f.ring && !f.pinky) return 'three';
      if (pinch) return 'ok';
      return 'none';
    }

    function updateGestureDisplay(gesture) {
      const g = gestures[gesture] || gestures.none;
      const confidence = gesture === 'none' ? 0.25 : 0.86 + Math.random() * 0.08;
      gestureNameElement.textContent = `${g.name} • ${g.action}`;
      confidenceFill.style.width = `${Math.round(confidence * 100)}%`;

      if (gesture !== 'none' && gesture !== lastGesture) {
        gestureHistory.unshift({ name: g.name, time: new Date().toLocaleTimeString() });
        gestureHistory = gestureHistory.slice(0, 6);
        historyList.innerHTML = gestureHistory.map(x => `<div class="history-item">${x.name} • ${x.time}</div>`).join('');
        lastGesture = gesture;
      }
    }

    function updateFingerStatus(landmarks) {
      const fingers = {
        thumb: isFingerExtended(landmarks, 'thumb'),
        index: isFingerExtended(landmarks, 'index'),
        middle: isFingerExtended(landmarks, 'middle'),
        ring: isFingerExtended(landmarks, 'ring'),
        pinky: isFingerExtended(landmarks, 'pinky')
      };
      Object.entries(fingers).forEach(([k, v]) => fingerElements[k].classList.toggle('up', v));
    }

    function pushTrail(landmarks) {
      const p = landmarks[9];
      if (!p) return;
      trails.push({
        x: p.x * canvasElement.width,
        y: p.y * canvasElement.height,
        life: 1
      });
      trails = trails.slice(-40);
    }

    function drawTrails() {
      trails.forEach(t => {
        canvasCtx.beginPath();
        canvasCtx.arc(t.x, t.y, 5, 0, Math.PI * 2);
        canvasCtx.fillStyle = `rgba(34, 211, 238, ${t.life * 0.35})`;
        canvasCtx.fill();
        t.life -= 0.02;
      });
      trails = trails.filter(t => t.life > 0);
    }

    function updatePointer(landmarks) {
      const p = landmarks[8];
      if (!p) return;
      crosshair.style.opacity = 1;
      crosshair.style.left = `${p.x * 100}%`;
      crosshair.style.top = `${p.y * 100}%`;
    }

    document.getElementById('toggleLandmarksBtn').onclick = (e) => {
      showLandmarks = !showLandmarks;
      e.target.classList.toggle('active', showLandmarks);
    };
    document.getElementById('toggleSkeletonBtn').onclick = (e) => {
      showSkeleton = !showSkeleton;
      e.target.classList.toggle('active', showSkeleton);
    };
    document.getElementById('toggleTrailsBtn').onclick = (e) => {
      showTrails = !showTrails;
      e.target.classList.toggle('active', showTrails);
      if (!showTrails) trails = [];
    };
    document.getElementById('clearHistoryBtn').onclick = () => {
      gestureHistory = [];
      historyList.innerHTML = '<div class="history-item">--</div>';
    };

    window.addEventListener('resize', () => {
      const c = document.getElementById('video-container');
      canvasElement.width = c.clientWidth;
      canvasElement.height = c.clientHeight;
    });
  </script>
</body>
</html>
